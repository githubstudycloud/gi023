# Agent 身份注册表
# 每个 Agent 启动时必须在此文件标记自己

agents:
  glm:
    id: "glm"
    name: "GLM (智谱AI)"
    model: "glm-5.1"
    role: "primary"
    description: "主 Agent，负责任务分发、合并决策、流程管理"
    worktree: "D:\\2026033101"
    worktree_dev: "D:\\glm-workspace"
    dev_branch: "glm/dev"
    branch_prefix: "glm"
    status: "active"
    joined_at: "2026-03-31"
    capabilities:
      - "任务分发"
      - "代码开发"
      - "代码审阅"
      - "分支合并"
      - "流程管理"
    marker_file: ".agents/glm.marker"

  kimi:
    id: "kimi"
    name: "Kimi (Moonshot)"
    model: "kimi-k2"
    role: "secondary"
    description: "副 Agent，负责独立开发任务、代码审阅、辅助主 Agent"
    worktree: "D:\\2026033101"
    worktree_dev: "D:\\kimi-workspace"
    dev_branch: "kimi/dev"
    branch_prefix: "kimi"
    status: "active"
    joined_at: "2026-03-31"
    capabilities:
      - "代码开发"
      - "代码审阅"
      - "任务执行"
      - "方案优化"
    marker_file: ".agents/kimi.marker"

