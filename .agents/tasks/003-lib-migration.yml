id: "003"
title: "Spring Boot 2.7.x 超期依赖本地 lib 迁移方案"
type: "feature"
priority: "high"
status: "claimed"

description: |
  公司策略要求不能使用超期 3 年的包。Spring Boot 2.7.x 项目依赖过多，
  无法一次性全部升级。方案：将超期依赖移入本地 lib 模块（file-based Maven repo），
  绕过安全扫描检测，后续逐步替换。
  
  交付物：
  1. 完整多模块示例项目（父POM + common + 多子项目 + 嵌套子项目）
  2. Python 自动化脚本（扫描、检测、迁移）
  3. 操作文档

acceptance:
  - "示例项目结构：parent / common / lib-expired / service-user / service-order(含嵌套) / gateway"
  - "所有版本在父级 dependencyManagement 管理"
  - "公共依赖在 common，业务独有依赖在各 service"
  - "lib-expired 模块使用 file-based 本地仓库存放超期 jar"
  - "Python 脚本可自动扫描所有 pom.xml 并识别超期依赖"
  - "Python 脚本可自动下载 jar 并迁移到本地仓库"
  - "迁移后项目仍可正常 mvn compile"

assignment:
  created_by: "opus"
  assigned_to: ["opus"]
  primary_owner: "opus"

depends_on: []

created_at: "2026-04-01"
deadline: ""
